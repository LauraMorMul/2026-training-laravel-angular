<ion-header class="header__wrapper">
  <ion-toolbar>
    @if (userName !== null) {
    <ion-chip slot="start" color="secondary">
      <ion-avatar>
        <img [alt]="userName" [src]="imageService.formatImageSrc(userImg)" />
      </ion-avatar>
      <ion-label>{{ userName }}</ion-label>
    </ion-chip>
    }
    <ion-title>{{restaurant?.name}}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="caja">
    <div class="side-menu__wrapper">
      <p></p>
      <nav>
        <ion-buttons>
          <ion-button [routerLink]="['/tpv/tables']">Mesas</ion-button>
        </ion-buttons>
      </nav>
      <ion-button (click)="cerrarSesion()">Salir</ion-button>
    </div>
    <router-outlet></router-outlet>
  </div>
</ion-content>
