<ion-header>
  <ion-toolbar>
    <ion-title>Número de comensales</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <div class="numpad-body__input">
    <h3>@if (diners) {
    {{diners}}  
    } @else {
      0
    }
      </h3>
  </div>
  <div class="numpad-body__buttons">
    @for (number of ['1','2','3','4','5','6','7','8','9','<-', '0', '✓']; track $index) {
      <ion-button (click)="handleInput(number)">{{ number }}</ion-button>
    }
  </div>
</ion-content>
