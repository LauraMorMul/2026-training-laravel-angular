<ion-card>
  <ion-card-header>
    <ion-card-title>Anadir una mesa</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <form [formGroup]="formulario">
      <ion-grid>
        <ion-row>
          <ion-col>
            <ion-label for="name">Nombre</ion-label>
            <ion-input
              type="text"
              name="name"
              id="name"
              mode="md"
              fill="solid"
              aria-label="name"
              formControlName="name"
            ></ion-input>
          </ion-col>
          <ion-col>
            <ion-label for="zona">Zona</ion-label>
            <ion-select
              aria-label="zona"
              interface="popover"
              mode="md"
              fill="solid"
              placeholder="Selecciona una zona o créala"
              formControlName="zone"
            >
              @for (zone of zones; track zone) {
                <ion-select-option [value]="zone.id">{{
                  zone.name
                }}</ion-select-option>
              }
            </ion-select>
            <ion-col>
              <ion-button id="open-modal">Crear zona</ion-button>
            </ion-col>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-button
              type="submit"
              [disabled]="!formulario.valid"
              (click)="addTable()"
            >
              Crear mesa
            </ion-button>
            <ion-button type="reset">Cancelar</ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </form>
  </ion-card-content>
</ion-card>


<ion-modal trigger="open-modal" (willDismiss)="onWillDismiss($event)">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="cancel()">Cancel</ion-button>
          </ion-buttons>
          <ion-title>Welcome</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="confirm()" [strong]="true">Confirm</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-input
            label="Enter your name"
            labelPlacement="stacked"
            type="text"
            placeholder="Your name"></ion-input>
        </ion-item>
      </ion-content>
    </ng-template>
  </ion-modal>
