<ion-header>
  <ion-toolbar>
    <ion-title>Modificar familia</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <form [formGroup]="formulario" (ngSubmit)="updateFamily()">
    <ion-row>
      <ion-col>
        <ion-label for="name">Nombre</ion-label>
        <ion-input
          type="text"
          name="name"
          id="name"
          mode="md"
          fill="solid"
          aria-label="name"
          formControlName="name"
          [placeholder]="family.name"
        ></ion-input>
      </ion-col>
      <ion-col>
        <ion-label for="active">Activa</ion-label>
        <ion-toggle formControlName="active"></ion-toggle>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-button type="submit">Actualizar familia</ion-button>
        <ion-button type="button" (click)="closeModal()">Cancelar</ion-button>
      </ion-col>
    </ion-row>
  </form>
</ion-content>
