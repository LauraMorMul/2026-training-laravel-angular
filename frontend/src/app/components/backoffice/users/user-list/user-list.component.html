<ion-card>
  <ion-card-header>
    <ion-card-title>Listado de usuarios</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-searchbar (ionInput)="handleInput($event)" placeholder="Buscar por nombre"></ion-searchbar>
    <ion-list>
      @for (user of results; track user) {
        <ion-item button (click)="abrirModalUsuario(user)">
          <ion-avatar aria-hidden="true" slot="start">
            <img
              alt="{{ user.name }}"
              [src]="user?.imageSrc | imageFormatterPipe"
            />
          </ion-avatar>
          <ion-label>{{ user.name }}</ion-label>
          <ion-label>{{ user.email }}</ion-label>
          <ion-label>{{ user.role | roleFormatter }}</ion-label>
          <ion-button
            (click)="
              $event.stopPropagation(); showDeleteAlert(user.id, user.name)
            "
            [disabled]="user.role === 'admin'"
            color="danger"
            >Eliminar</ion-button
          >
          <ion-button
            (click)="$event.stopPropagation(); abrirModalModificar(user)"
            
            color="secondary"
            >Modificar</ion-button
          >
        </ion-item>
      }
    </ion-list>
  </ion-card-content>
</ion-card>
