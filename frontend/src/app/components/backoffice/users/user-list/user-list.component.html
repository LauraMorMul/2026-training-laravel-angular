<ion-card>
  <ion-card-header>
    <ion-card-title>Listado de usuarios</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <ion-grid>
      <ion-row>
        <ion-col size="9">
          <ion-searchbar
            (ionInput)="handleInput($event)"
            placeholder="Buscar por nombre"
          ></ion-searchbar>
        </ion-col>
        <ion-col>
          <ion-label for="rol">Rol</ion-label>
          <ion-select
            aria-label="rol"
            interface="popover"
            mode="md"
            fill="solid"
            placeholder="Rol de usuario"
            (ionChange)="handleChange($event)"
          >
            <ion-select-option value="admin">Administrador</ion-select-option>
            <ion-select-option value="supervisor">Supervisor</ion-select-option>
            <ion-select-option value="operator">Operador</ion-select-option>
            <ion-select-option value="">Todos los roles</ion-select-option>
          </ion-select>
        </ion-col>
      </ion-row>
      <ion-row class="ion-align-items-center" color="primary">
        <ion-col>Foto</ion-col>
        <ion-col>Nombre</ion-col>
        <ion-col>Email</ion-col>
        <ion-col>Rol</ion-col>
        <ion-col>Acciones</ion-col>
      </ion-row>
      @for (user of results; track user.id) {
        <ion-row class="ion-justify-content-center">
          <ion-col
            ><ion-avatar aria-hidden="true">
              <img
                alt="{{ user.name }}"
                [src] = imageService.formatImageSrc(user.imageSrc)
              /> </ion-avatar
          ></ion-col>
          <ion-col>
            {{ user.name }}
          </ion-col>
          <ion-col>
            {{ user.email }}
          </ion-col>
          <ion-col>
            {{ user.role | roleFormatter }}
          </ion-col>
          <ion-col>
            <ion-button (click)="abrirModalUsuario(user)" color="tertiary">
              <ion-icon name="eye-outline"></ion-icon>
            </ion-button>
            <ion-button
              (click)="$event.stopPropagation(); abrirModalModificar(user)"
              color="secondary"
              ><ion-icon name="create-outline"></ion-icon
            ></ion-button>
            <ion-button
              (click)="showDeleteAlert(user.id, user.name)"
              [disabled]="user.role === 'admin'"
              color="danger"
              ><ion-icon name="trash-outline"></ion-icon
            ></ion-button>
          </ion-col>
        </ion-row>
      }
    </ion-grid>
  </ion-card-content>
</ion-card>
