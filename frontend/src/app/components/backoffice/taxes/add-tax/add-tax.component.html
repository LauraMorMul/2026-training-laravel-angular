<ion-card>
  <ion-card-header>
    <ion-card-title>Añadir impuesto</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <form [formGroup]="formulario">
      <ion-grid>
        <ion-row>
          <ion-col>
            <ion-label for="name">Nombre</ion-label>
            <ion-input
              type="text"
              name="name"
              id="name"
              mode="md"
              fill="solid"
              aria-label="name"
              formControlName="name"
              placeholder="Reducido"
            ></ion-input>
          </ion-col>
          <ion-col>
            <ion-label for="percentage">Porcentaje</ion-label>
            <ion-input
              type="text"
              inputmode="decimal"
              name="percentage"
              id="percentage"
              mode="md"
              fill="solid"
              aria-label="percentage"
              formControlName="percentage"
              placeholder="10"
            ></ion-input>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-button type="submit" [disabled]="!formulario.valid" (click)="addTax()">Crear impuesto</ion-button>
            <ion-button type="reset">Cancelar</ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </form>
  </ion-card-content>
</ion-card>
