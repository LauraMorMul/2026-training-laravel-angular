<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button type="button" (click)="closeModal()">Cerrar</ion-button>
    </ion-buttons>
    <ion-title>Modificar impuesto</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <form [formGroup]="formulario" (ngSubmit)="updateTax()">
    <ion-row>
      <ion-col>
        <ion-label for="name">Nombre</ion-label>
        <ion-input
          type="text"
          name="name"
          id="name"
          mode="md"
          fill="solid"
          aria-label="name"
          formControlName="name"
          [placeholder]="tax.name"
        ></ion-input>
      </ion-col>
      <ion-col>
        <ion-label for="percentage">Porcentaje</ion-label>
        <ion-input
          type="text"
          inputmode="decimal"
          name="percentage"
          id="percentage"
          mode="md"
          fill="solid"
          aria-label="percentage"
          formControlName="percentage"
          [placeholder]="tax.percentage"
        ></ion-input>
      </ion-col>
    </ion-row>
    <ion-row>
      <ion-col>
        <ion-button type="submit">Actualizar impuesto</ion-button>
        <ion-button type="button" (click)="closeModal()">Cancelar</ion-button>
      </ion-col>
    </ion-row>
  </form>
</ion-content>
