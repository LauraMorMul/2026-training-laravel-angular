<ion-card>
  <ion-card-header>
    <ion-card-title>Añadir una zona</ion-card-title>
  </ion-card-header>
  <ion-card-content>
    <form [formGroup]="formulario">
      <ion-grid>
        <ion-row>
          <ion-col>
            <ion-label for="name">Nombre</ion-label>
            <ion-input
              type="text"
              name="name"
              id="name"
              mode="md"
              fill="solid"
              aria-label="name"
              formControlName="name"
            ></ion-input>
          </ion-col>
        </ion-row>
        <ion-row>
          <ion-col>
            <ion-button
              type="submit"
              [disabled]="!formulario.valid"
              (click)="addZone()"
            >
              Crear zona
            </ion-button>
            <ion-button type="reset">Cancelar</ion-button>
          </ion-col>
        </ion-row>
      </ion-grid>
    </form>
  </ion-card-content>
</ion-card>
